<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="Calc.html">Calculator</a>
    <a href="inv.html">Inventory</a>
    <a href="/resources">Resources</a>
    <a href="/buymeabeer" style="color:#f59e0b; font-weight:700;">🍺 Buy Me a Beer</a>
  </div>

  <div class="navbar-right">
    <!-- Dark Mode Toggle -->
    <button id="themeToggle" class="theme-toggle-btn">
      🌙
    </button>

    <!-- User Profile -->
    <div class="user-profile" id="userProfile">
      <div class="user-avatar-container">
        <img id="userAvatar" 
             class="user-avatar" 
             alt="User avatar" 
             width="38" 
             height="38"
             src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff&size=128">
        <div class="user-info">
          <span id="userName" class="user-name">Loading...</span>
        </div>
      </div>
      
      <button id="logoutBtn" class="logout-btn">
        Logout
      </button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="header">
    <h1>Inventory Viewer</h1>
    
    <div class="inventory-controls">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search inventory..." 
        class="search-input">
      
      <button id="refreshBtn" class="refresh-btn">🔄 Refresh</button>
      <button id="addNewBtn" class="add-btn">+ Add New Record</button>
      <button id="downloadCsvBtn" class="csv-btn">📥 Download CSV</button>
    </div>
  </div>

  <table id="invTable">
    <thead id="invThead"></thead>
    <tbody id="invTbody"></tbody>
  </table>

  <div id="status"></div>
</div>

  <!-- Record Modal -->
  <div id="recordModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Add New Record</h2>
      <div id="modalForm"></div>
      <div class="modal-buttons">
        <button id="cancelModalBtn" class="cancel-btn">Cancel</button>
        <button id="saveModalBtn" class="save-btn-modal">Save Record</button>
      </div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script type="module" src="inv.js"></script>
</body>
</html>
