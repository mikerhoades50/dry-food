<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Batch System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container" style="text-align:center; margin-top:120px;">
    <h1>Batch Processing System</h1>
    <p style="margin:40px 0; font-size:1.25rem;">Sign in to continue</p>
    
    <button id="googleLoginBtn" style="padding:18px 48px; font-size:1.35rem; font-weight:600; background:#4285f4; color:white; border:none; border-radius:12px; cursor:pointer; display:flex; align-items:center; gap:12px; margin:0 auto;">
      <span style="font-size:1.8rem;">G</span> Sign in with Google
    </button>

    <p id="status" style="margin-top:30px; color:#666;"></p>
  </div>

  <script src="theme.js"></script>
 <script type="module">
import { supabase, getRedirectURL } from './auth.js';

const googleBtn = document.getElementById('googleLoginBtn');
const statusEl = document.getElementById('status');

googleBtn.addEventListener('click', async () => {
  statusEl.textContent = 'Redirecting to Google...';

  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/'
    }
  });

  if (error) {
    statusEl.textContent = 'Error: ' + error.message;
    console.error(error);
  }
});
</script>
</body>
</html>
